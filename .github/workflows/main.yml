name: Update DNS Blocklists

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: blocklist-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build massdns
        run: |
          sudo apt-get install -y --no-install-recommends build-essential
          git clone --depth 1 https://github.com/blechschmidt/massdns /tmp/massdns
          make -C /tmp/massdns -j$(nproc)
          sudo mv /tmp/massdns/bin/massdns /usr/local/bin/massdns

      - name: Run
        run: |
          BLOCK_OUT="blocklists.txt"
          BLOCK_TMP="blocklists.tmp"
          RESOLVERS_FILE="resolvers.tmp"

          printf '%s\n' 8.8.8.8 8.8.4.4 > "$RESOLVERS_FILE"

          echo "Downloading..."
          curl -fsSL --max-time 90 --parallel --parallel-immediate \
            https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/popupads-onlydomains.txt \
            https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt \
            https://raw.githubusercontent.com/bigdargon/hostsVN/master/extensions/threat/hosts-VN \
            https://raw.githubusercontent.com/hagezi/dns-blocklists/main/wildcard/tif.mini-onlydomains.txt \
            https://badmojr.github.io/1Hosts/Lite/adblock.txt \
          | awk '{
              if (/^[[:space:]]*$/ || /^[!#;]/) next
              line = tolower($0)
              sub(/^@@\|\|?/, "", line); sub(/^\|\|?/, "", line)
              sub(/\^.*/, "", line);     sub(/[#!].*/, "", line)
              sub(/\/.*/, "", line);     sub(/:.*/, "", line)
              sub(/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+[[:space:]]+/, "", line)
              gsub(/^[[:space:]]+|[[:space:]]+$/, "", line)
              if (line ~ /^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?)+$/ && !seen[line]++) print line
            }' | sort -u > "$BLOCK_TMP"

          TOTAL=$(wc -l < "$BLOCK_TMP")
          echo "Total: $TOTAL"

          SERVFAIL_TMP="servfail.tmp"

          # Pass 1 – concurrency 2000, timeout 500ms, tự retry SERVFAIL 1 lần
          echo "Pass 1..."
          REFUSED_TMP="refused.tmp"
          massdns -r "$RESOLVERS_FILE" -t A -o J -s 800 --retry SERVFAIL "$BLOCK_TMP" 2>/dev/null \
          | tee \
            >(jq -r 'select(.status == "SERVFAIL") | .name | rtrimstr(".")' > "$SERVFAIL_TMP") \
            >(jq -r 'select(.status == "REFUSED")  | .name | rtrimstr(".")' > "$REFUSED_TMP") \
          | jq -r 'select(.status == "NOERROR") | .name | rtrimstr(".")' > "$BLOCK_OUT"

          SERVFAIL_COUNT=$(wc -l < "$SERVFAIL_TMP")
          REFUSED_COUNT=$(wc -l < "$REFUSED_TMP")
          echo "Pass 1 done – SERVFAIL còn: $SERVFAIL_COUNT | REFUSED: $REFUSED_COUNT"
          if [[ "$REFUSED_COUNT" -gt 0 ]]; then
            echo "--- REFUSED domains ---"
            cat "$REFUSED_TMP"
            echo "-----------------------"
          fi


          # Pass 2 – retry SERVFAIL với concurrency thấp hơn
          if [[ "$SERVFAIL_COUNT" -gt 0 ]]; then
            echo "Pass 2..."
            massdns -r "$RESOLVERS_FILE" -t A -o J -s 200 --retry SERVFAIL "$SERVFAIL_TMP" \
            | jq -r 'select(.status == "NOERROR") | .name | rtrimstr(".")' >> "$BLOCK_OUT"
          fi

          sort -u "$BLOCK_OUT" -o "$BLOCK_OUT"
          VALID=$(wc -l < "$BLOCK_OUT")
          echo "Valid: $VALID / $TOTAL"
          rm -f "$BLOCK_TMP" "$RESOLVERS_FILE" "$SERVFAIL_TMP" "$REFUSED_TMP"

      - name: Commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update blocklists"
          file_pattern: 'blocklists.txt'
